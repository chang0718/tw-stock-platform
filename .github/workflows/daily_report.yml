name: 每日盤後分析報告

on:
  schedule:
    # 台灣時間 14:30 = UTC 06:30
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # 允許手動觸發測試

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas numpy

      - name: Create data directory
        run: mkdir -p tw_quant_data

      - name: Run quantitative model（生成快照供 TOP5 使用）
        run: python scripts/run_model.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: Send daily report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.GMAIL_USER }}
        run: python scripts/daily_report.py
